<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nevio — Legal &amp; Support</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 48px 20px 80px;
      background: #EFECFB;
      color: #1C1C1E;
      display: flex;
      justify-content: center;
    }
    .page { width: 100%; max-width: 480px; text-align: center; }
    .logo-badge {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 20px rgba(108, 92, 231, 0.15);
    }
    .logo-badge img { width: 44px; height: 44px; display: block; }
    .wordmark { color: #6C5CE7; font-weight: 800; font-size: 24px; margin: 0 0 8px; }
    .subtitle { color: #8E8E93; font-size: 15px; margin: 0 0 32px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .link-card {
      display: block;
      background: #fff;
      border-radius: 16px;
      padding: 18px 20px;
      text-decoration: none;
      color: #1C1C1E;
      font-weight: 600;
      font-size: 16px;
      box-shadow: 0 8px 20px rgba(108, 92, 231, 0.1);
    }
    .footer { text-align: center; color: #8E8E93; font-size: 12px; margin-top: 32px; }
    .footer a { color: #6C5CE7; }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo-badge"><img src="logo.png" alt="Nevio" /></div>
    <p class="wordmark">Nevio</p>
    <p class="subtitle">Legal &amp; support information</p>
    <div class="links">
      <a class="link-card" href="privacy.html">Privacy Policy</a>
      <a class="link-card" href="terms.html">Terms of Use</a>
      <a class="link-card" href="faq.html">FAQ</a>
    </div>
    <p class="footer">Nevio · <a href="mailto:support@nevio.agency">support@nevio.agency</a></p>
  </div>
</body>
</html>
